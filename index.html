<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重复文件清理 · fclones 上传 + rm 删除</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f4f6fa;
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 28px 32px 40px;
        }
        h1 {
            font-size: 26px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 8px;
            color: #0b1b2f;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .upload-area {
            background: #f8faff;
            border: 2px dashed #cdd9ed;
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            transition: border-color 0.2s, background 0.1s;
        }
        .upload-area:hover {
            border-color: #8aa4d0;
            background: #f5f9ff;
        }
        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1f2a3f;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .upload-label:hover {
            background: #142033;
        }
        .upload-label input[type="file"] {
            display: none;
        }
        .file-status {
            color: #1f2a3a;
            background: #eef3fc;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .file-status .clear-btn {
            background: transparent;
            border: none;
            color: #8b2f2f;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            margin-left: 6px;
            padding: 0 6px;
        }
        .file-status .clear-btn:hover {
            color: #b11f1f;
        }
        .subhead {
            color: #4a5b6e;
            font-size: 15px;
            border-bottom: 1px solid #e9edf4;
            padding-bottom: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .stats {
            background: #f0f3f9;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #1f2a3a;
            font-weight: 500;
        }
        .file-group {
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid #eef2f8;
            margin-bottom: 22px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: box-shadow 0.15s;
        }
        .file-group:hover {
            box-shadow: 0 8px 18px rgba(0, 20, 40, 0.06);
        }
        .group-header {
            background: #f9fbfe;
            padding: 14px 22px;
            border-radius: 18px 18px 0 0;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .hash-info {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .hash {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 15px;
            font-weight: 500;
            color: #1f2a3a;
            background: #eef3fc;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .file-count {
            background: #d5deec;
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #1d2b3f;
        }
        .size-badge {
            color: #2d4057;
            font-size: 14px;
            background: #eef2f8;
            padding: 2px 14px;
            border-radius: 30px;
        }
        .group-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .select-all-btn, .group-delete-btn {
            background: transparent;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            color: #1f2a3a;
            cursor: pointer;
            transition: 0.1s;
            background: white;
        }
        .select-all-btn:hover {
            background: #eef3fc;
            border-color: #a0b8d4;
        }
        .group-delete-btn {
            background: #fee8e8;
            border-color: #f5c6c6;
            color: #a03838;
        }
        .group-delete-btn:hover {
            background: #fdd5d5;
            border-color: #e8a0a0;
        }
        .group-delete-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .file-list {
            padding: 6px 8px 8px 18px;
            list-style: none;
            margin: 0;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 14px 10px 6px;
            border-bottom: 1px solid #f0f4fc;
            gap: 12px;
            transition: background 0.08s;
            border-radius: 10px;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-item:hover {
            background: #f8faff;
        }
        .file-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 4px;
            flex-shrink: 0;
            accent-color: #2563eb;
            cursor: pointer;
        }
        .file-path {
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 14px;
            color: #1b2a41;
            word-break: break-all;
            line-height: 1.5;
            padding: 2px 0;
            flex: 1;
        }
        .delete-bar {
            position: sticky;
            bottom: 0;
            z-index: 50;
            margin-top: 32px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 18px;
            border-top: 1px solid #e9edf4;
            padding: 18px 4px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            box-shadow: 0 -6px 20px rgba(11, 27, 51, 0.06);
            border-radius: 0 0 24px 24px;
        }
        .selected-info {
            font-size: 15px;
            color: #1f2a3a;
            background: #f0f5ff;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: 500;
        }
        .btn-delete {
            background: #d92b2b;
            border: none;
            border-radius: 60px;
            padding: 12px 36px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: background 0.15s, transform 0.05s;
            box-shadow: 0 4px 10px rgba(200, 30, 30, 0.15);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-delete:hover {
            background: #b31f1f;
        }
        .btn-delete:active {
            transform: scale(0.96);
        }
        .btn-delete:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #5f738d;
            background: #fafcff;
            border-radius: 30px;
            font-size: 16px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0b1f33;
            color: #edf2f9;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            z-index: 999;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .inline-code {
            background: #eef3fc;
            padding: 2px 10px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 13px;
        }
        @media (max-width: 700px) {
            .container { padding: 16px; }
            .group-header { flex-direction: column; align-items: stretch; }
            .hash-info { flex-wrap: wrap; }
            .file-item { flex-wrap: wrap; }
            .file-path { font-size: 13px; }
            .upload-area { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🧩 重复文件清理 · 上传 fclones 结果</h1>

        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <div>
                <label class="upload-label" id="uploadLabel">
                    📤 选择 fclones 结果文件
                    <input type="file" id="fileInput" accept=".txt,.log,.json,.csv,.tsv,.text,text/plain">
                </label>
                <span style="margin-left: 12px; font-size: 14px; color: #3b4d66;">或拖拽文件到此处</span>
            </div>
            <div class="file-status" id="fileStatus">
                <span id="fileNameDisplay">未上传</span>
                <button class="clear-btn" id="clearFileBtn" title="清空数据">✕</button>
            </div>
        </div>

        <div class="subhead">
            <span>基于 fclones 输出 · 勾选需要删除的重复副本 · 执行 <span class="inline-code">rm</span> 删除</span>
            <span class="stats" id="statsDisplay">0 个文件组 · 0 个文件</span>
        </div>

        <!-- 动态渲染文件组 -->
        <div id="fileGroupsContainer"><div class="empty-message">📂 请上传 fclones 结果文件</div></div>

        <!-- 底部操作栏 -->
        <div class="delete-bar">
            <span class="selected-info" id="selectedCount">☐ 已选 0 个文件</span>
            <button class="btn-delete" id="deleteBtn" disabled>🗑️ 执行 rm 删除</button>
        </div>
    </div>

    <!-- 轻提示 -->
    <div id="toast" class="toast"></div>

    <script>
        (function() {
            // ----- DOM 引用 -----
            const fileInput = document.getElementById('fileInput');
            const clearFileBtn = document.getElementById('clearFileBtn');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const container = document.getElementById('fileGroupsContainer');
            const statsDisplay = document.getElementById('statsDisplay');
            const selectedCountSpan = document.getElementById('selectedCount');
            const deleteBtn = document.getElementById('deleteBtn');
            const toast = document.getElementById('toast');
            const uploadArea = document.getElementById('uploadArea');

            // ----- 状态 -----
            let groups = [];                     // 当前文件组 [{ hash, size, paths }]
            const checkedSet = new Set();        // 已选中的路径集合（size 即选中数，O(1)）
            let totalFiles = 0;                  // 缓存的文件总数，仅在 groups 变化时更新
            let io = null;                        // 虚拟滚动用的 IntersectionObserver

            // ----- 工具: 解析 fclones 文本 -----
            function parseFclonesText(text) {
                const lines = text.split(/\r?\n/);
                const resultGroups = [];
                let currentHash = null;
                let currentSize = null;
                let currentPaths = [];

                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;

                    // 匹配行: "hash, size * count:"  例如 "93d65bf... , 15292278 B (15.3 MB) * 9:"
                    const headerMatch = line.match(/^([a-fA-F0-9]+),\s*(.+?)\s*\*\s*(\d+):/);
                    if (headerMatch) {
                        // 保存之前的组
                        if (currentHash && currentPaths.length > 0) {
                            resultGroups.push({
                                hash: currentHash,
                                size: currentSize || 'unknown',
                                paths: [...currentPaths]
                            });
                        }
                        currentHash = headerMatch[1].trim();
                        currentSize = headerMatch[2].trim();
                        currentPaths = [];
                        continue;
                    }

                    // 匹配路径行 (以 / 或 . 开头，或者包含路径特征)
                    if (currentHash && (line.startsWith('/') || line.startsWith('.') || line.includes('/'))) {
                        // 移除可能的前导空格和缩进
                        const path = line.replace(/^[\s]*/, '');
                        if (path.length > 0) {
                            currentPaths.push(path);
                        }
                        continue;
                    }

                    // 如果行以 "-" 或 "* " 开头但不符合上述, 尝试提取路径
                    if (currentHash && (line.startsWith('-') || line.startsWith('*'))) {
                        const path = line.replace(/^[\s\-\*]+/, '').trim();
                        if (path && (path.startsWith('/') || path.startsWith('.') || path.includes('/'))) {
                            currentPaths.push(path);
                        }
                    }
                }

                // 保存最后一组
                if (currentHash && currentPaths.length > 0) {
                    resultGroups.push({
                        hash: currentHash,
                        size: currentSize || 'unknown',
                        paths: [...currentPaths]
                    });
                }

                // 过滤掉paths为空的组
                return resultGroups.filter(g => g.paths.length > 0);
            }

            // ----- 加载数据 -----
            function loadDataFromText(text) {
                const parsed = parseFclonesText(text);
                if (parsed.length === 0) {
                    showToast('⚠️ 未能解析出有效文件组，请检查格式');
                    return false;
                }
                groups = parsed;
                // 重置选中状态（Set 空即全部未选，无需预填 22 万条）
                checkedSet.clear();
                totalFiles = groups.reduce((acc, g) => acc + g.paths.length, 0);
                render();
                showToast(`✅ 成功解析 ${groups.length} 个文件组，共 ${totalFiles} 个文件`);
                return true;
            }

            // ----- 渲染 -----
            // 虚拟滚动：只为每个组创建一个空的占位卡片（带估算高度），
            // 真正的内容（表头 + 文件列表）在滚动进入视口附近时才挂载，
            // 离开视口后卸载，避免一次性生成数十万 DOM 节点。

            // 估算某个组渲染后的高度（border-box），用于占位，减少滚动跳动
            function estimateGroupHeight(group) {
                return 70 + group.paths.length * 41;
            }

            // 生成一个组的内部 HTML（不含外层 .file-group 容器）
            function buildGroupInner(group, groupIndex) {
                const pathCount = group.paths.length;
                const hasChecked = group.paths.some(p => checkedSet.has(p));

                let html = '';
                html += `<div class="group-header">`;
                html += `<div class="hash-info">`;
                html += `<span class="hash">${group.hash}</span>`;
                html += `<span class="file-count">📄 ${pathCount} 个副本</span>`;
                html += `<span class="size-badge">${group.size || 'unknown'}</span>`;
                html += `</div>`;
                html += `<div class="group-actions">`;
                html += `<button class="select-all-btn" data-group-index="${groupIndex}" data-action="selectAll">全选</button>`;
                html += `<button class="group-delete-btn" data-group-index="${groupIndex}" data-action="groupDelete" ${!hasChecked ? 'disabled' : ''}>删除选中</button>`;
                html += `</div>`;
                html += `</div>`;

                html += `<ul class="file-list">`;
                group.paths.forEach((path) => {
                    html += `<li class="file-item">`;
                    html += `<input type="checkbox" class="file-checkbox" data-path="${encodeURIComponent(path)}" ${checkedSet.has(path) ? 'checked' : ''} />`;
                    html += `<span class="file-path">${escapeHtml(path)}</span>`;
                    html += `</li>`;
                });
                html += `</ul>`;
                return html;
            }

            function mountGroup(el) {
                if (el.dataset.mounted) return;
                const i = parseInt(el.dataset.groupIndex, 10);
                el.innerHTML = buildGroupInner(groups[i], i);
                el.dataset.mounted = '1';
                el.style.minHeight = '';   // 让真实内容决定高度
            }

            function unmountGroup(el) {
                if (!el.dataset.mounted) return;
                // 卸载前锁定当前高度，保证滚动条位置稳定
                el.style.minHeight = el.offsetHeight + 'px';
                el.innerHTML = '';
                delete el.dataset.mounted;
            }

            function onIntersect(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) mountGroup(entry.target);
                    else unmountGroup(entry.target);
                });
            }

            function render() {
                if (io) { io.disconnect(); io = null; }

                if (!groups || groups.length === 0) {
                    container.innerHTML = `<div class="empty-message">📂 暂无重复文件数据，请上传 fclones 结果</div>`;
                    updateStatsAndUI();
                    return;
                }

                // 只创建占位卡片，内容延迟挂载
                const frag = document.createDocumentFragment();
                groups.forEach((group, groupIndex) => {
                    const el = document.createElement('div');
                    el.className = 'file-group';
                    el.dataset.groupIndex = groupIndex;
                    el.style.minHeight = estimateGroupHeight(group) + 'px';
                    frag.appendChild(el);
                });
                container.innerHTML = '';
                container.appendChild(frag);

                // 视口上下各预留 600px 提前挂载，滚动更顺滑
                io = new IntersectionObserver(onIntersect, { rootMargin: '600px 0px' });
                container.querySelectorAll('.file-group').forEach(el => io.observe(el));

                updateStatsAndUI();
            }

            // ----- 事件委托 (绑定一次，render 重建 DOM 后无需重新绑定) -----
            function bindContainerEvents() {
                // checkbox 变化
                container.addEventListener('change', function(e) {
                    const cb = e.target;
                    if (!cb.classList.contains('file-checkbox')) return;
                    const rawPath = decodeURIComponent(cb.dataset.path);
                    if (cb.checked) checkedSet.add(rawPath);
                    else checkedSet.delete(rawPath);
                    updateStatsAndUI();
                    updateGroupDeleteButtons();
                });

                // 全选 / 组删除按钮
                container.addEventListener('click', function(e) {
                    const btn = e.target.closest('.select-all-btn, .group-delete-btn');
                    if (!btn) return;
                    const group = groups[parseInt(btn.dataset.groupIndex, 10)];
                    if (!group) return;

                    if (btn.dataset.action === 'selectAll') {
                        const newValue = !group.paths.every(p => checkedSet.has(p));
                        group.paths.forEach(p => {
                            if (newValue) checkedSet.add(p);
                            else checkedSet.delete(p);
                        });
                        btn.closest('.file-group')
                           .querySelectorAll('.file-checkbox')
                           .forEach(cb => { cb.checked = newValue; });
                        updateStatsAndUI();
                        updateGroupDeleteButtons();
                    } else { // groupDelete
                        const selectedPaths = group.paths.filter(p => checkedSet.has(p));
                        if (selectedPaths.length === 0) {
                            showToast('该组没有选中任何文件');
                            return;
                        }
                        if (confirmDelete(selectedPaths.length)) {
                            executeDelete(selectedPaths);
                        }
                    }
                });
            }

            // ----- 更新组删除按钮状态 -----
            function updateGroupDeleteButtons() {
                container.querySelectorAll('.group-delete-btn').forEach(btn => {
                    const groupIndex = parseInt(btn.dataset.groupIndex, 10);
                    const group = groups[groupIndex];
                    if (group) {
                        const hasChecked = group.paths.some(p => checkedSet.has(p));
                        btn.disabled = !hasChecked;
                    }
                });
            }

            // ----- 更新统计 & 按钮 -----
            function updateStatsAndUI() {
                const checkedCount = checkedSet.size;   // O(1)
                statsDisplay.textContent = `${groups.length} 个文件组 · ${totalFiles} 个文件`;
                selectedCountSpan.textContent = `☑ 已选 ${checkedCount} 个文件`;
                deleteBtn.disabled = (checkedCount === 0);
            }

            // ----- 执行删除 (调用后端API) -----
            function executeDelete(filePaths) {
                if (!filePaths || filePaths.length === 0) {
                    showToast('没有文件需要删除');
                    return;
                }

                showToast(`⏳ 正在删除 ${filePaths.length} 个文件...`);

                const payload = { files: filePaths };

                fetch('/api/delete-files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`服务器响应错误: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        showToast(`✅ 成功删除 ${data.deletedCount || filePaths.length} 个文件`);
                        // 从数据中移除已删除的文件
                        removeDeletedPaths(filePaths);
                        render();
                    } else {
                        showToast(`❌ 删除失败: ${data.message || '未知错误'}`);
                        // 删除失败：取消这些路径的选中
                        uncheckPaths(filePaths);
                    }
                })
                .catch(err => {
                    console.error('删除请求失败:', err);
                    // 如果是本地测试，模拟删除成功
                    if (err.message.includes('Failed to fetch')) {
                        showToast(`⚠️ 后端服务未启动，模拟删除 ${filePaths.length} 个文件`);
                        removeDeletedPaths(filePaths);
                        render();
                    } else {
                        showToast(`❌ 请求失败: ${err.message}`);
                        // 删除失败：取消这些路径的选中
                        uncheckPaths(filePaths);
                    }
                });
            }

            // 取消一组路径的选中（用于删除失败后重置状态）
            function uncheckPaths(paths) {
                paths.forEach(p => checkedSet.delete(p));
                render();
            }

            // ----- 执行 rm 删除 (底部按钮) -----
            function executeRmDelete() {
                const selectedPaths = [...checkedSet];

                if (selectedPaths.length === 0) {
                    showToast('没有选中任何文件');
                    return;
                }

                if (confirmDelete(selectedPaths.length)) {
                    executeDelete(selectedPaths);
                }
            }

            // 从 groups 和 checkedSet 中移除已删除路径，并同步 totalFiles
            function removeDeletedPaths(deletedPaths) {
                const deletedSet = new Set(deletedPaths);
                let removedCount = 0;
                for (let i = groups.length - 1; i >= 0; i--) {
                    const group = groups[i];
                    group.paths = group.paths.filter(p => {
                        if (deletedSet.has(p)) {
                            checkedSet.delete(p);
                            removedCount++;
                            return false;
                        }
                        return true;
                    });
                    if (group.paths.length === 0) {
                        groups.splice(i, 1);
                    }
                }
                totalFiles -= removedCount;
            }

            // ----- 工具函数 -----
            const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => HTML_ESCAPES[m]);
            }

            // 统一的删除确认弹窗
            function confirmDelete(count) {
                return confirm(`确定要删除选中的 ${count} 个文件吗？`);
            }

            let toastTimer = null;
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3200);
            }

            // ----- 上传处理 -----
            function handleFile(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const text = e.target.result;
                    const success = loadDataFromText(text);
                    if (success) {
                        fileNameDisplay.textContent = file.name;
                    } else {
                        fileNameDisplay.textContent = '解析失败';
                    }
                };
                reader.onerror = function() {
                    showToast('读取文件失败');
                };
                reader.readAsText(file);
            }

            // ----- 清空数据 -----
            function clearData() {
                groups = [];
                checkedSet.clear();
                totalFiles = 0;
                fileNameDisplay.textContent = '未上传';
                render();
                showToast('已清空数据');
            }

            // ----- 事件绑定 -----
            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    handleFile(this.files[0]);
                }
                this.value = ''; // 允许重新选择同一文件
            });

            clearFileBtn.addEventListener('click', clearData);

            // 拖拽上传
            function resetDragStyle() {
                uploadArea.style.borderColor = '#cdd9ed';
                uploadArea.style.background = '#f8faff';
            }
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#2563eb';
                this.style.background = '#f0f6ff';
            });
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                resetDragStyle();
            });
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                resetDragStyle();
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    handleFile(files[0]);
                }
            });

            // 删除按钮
            deleteBtn.addEventListener('click', executeRmDelete);

            // ----- 初始化 (空状态) -----
            bindContainerEvents();
            render();

            console.log('💡 删除请求将发送到 /api/delete-files');
            console.log('💡 每个文件组都有独立的删除按钮');

        })();
    </script>
</body>
</html>
