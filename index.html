<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重复文件清理 · fclones 上传 + rm 删除</title>
    <script>
        // 尽早应用主题，避免刷新闪烁。默认跟随系统偏好。（必须内联，外链会引入闪烁）
        (function() {
            var saved = localStorage.getItem('theme');
            var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="app">
        <div class="page-head">
            <h1>重复文件清理</h1>
            <button class="theme-toggle" id="themeToggle" title="切换深色 / 浅色主题" aria-label="切换主题">🌙</button>
        </div>
        <div class="subhead">
            <span>上传 fclones 结果，勾选要删除的重复副本，执行 <span class="inline-code">rm</span> 删除</span>
            <span class="subhead-right">
                <span class="sort-control">
                    排序
                    <select class="sort-select" id="sortSelect">
                        <option value="default">默认顺序</option>
                        <option value="count-desc">副本数量：多 → 少</option>
                        <option value="count-asc">副本数量：少 → 多</option>
                    </select>
                </span>
                <span class="stats" id="statsDisplay">0 个文件组 · 0 个文件</span>
            </span>
        </div>

        <!-- 上传区域 -->
        <div class="card upload-area" id="uploadArea">
            <div class="upload-left">
                <label class="upload-label" id="uploadLabel">
                    选择 fclones 结果文件
                    <input type="file" id="fileInput" accept=".txt,.log,.json,.csv,.tsv,.text,text/plain">
                </label>
                <span class="upload-hint">或拖拽文件到此处</span>
            </div>
            <div class="file-status" id="fileStatus">
                <span id="fileNameDisplay">未上传</span>
                <button class="clear-btn" id="clearFileBtn" title="清空数据">清空</button>
            </div>
        </div>

        <!-- 动态渲染文件组 -->
        <div id="fileGroupsContainer"><div class="card empty-message">请上传 fclones 结果文件</div></div>

        <!-- 底部操作栏 -->
        <div class="card delete-bar">
            <span class="selected-info" id="selectedCount">已选 0 个文件</span>
            <button class="btn-delete" id="deleteBtn" disabled>执行 rm 删除</button>
        </div>
    </div>

    <!-- 轻提示 -->
    <div id="toast" class="toast"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
